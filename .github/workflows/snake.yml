name: Generate Snake

on: schedule:
      - cron: "0 */12 * * *"
    workflow_dispatch:

jobs:
    generate:
      run-on: ubuntu-latest
      steps: - uses: Platane/snk@v3 
      with:
       github_user_name: Divyansh230 
       outputs: dist/github-contribution-grid-snake.svg 
    - uses: actions/upload-artifact@v3 
      with: 
      name: snake
      path: dist/github-contribution-grid-snake.svg